<!DOCTYPE html>
<html lang="it">

<head>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' file:; script-src 'self' 'unsafe-inline' file: https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' file: https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' file: https://fonts.gstatic.com data:; img-src 'self' file: data: blob:; connect-src 'self' file:; media-src 'self' file: data: blob:; object-src 'none'; base-uri 'self'; frame-src 'self'">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyPi - Generatore QR/Barcode</title>
    <link rel="stylesheet" href="../../styles/utilities/qr-generator-style.css">
    <link rel="stylesheet" href="../../styles/utilities/qr-generator-bluearchive-style.css">
    <link rel="stylesheet" href="../../styles/utilities/bluearchive-pointer-effects.css">
</head>

<body>
    <div class="ba-utility-splash" id="baQrSplash" aria-hidden="true">
        <div class="ba-splash-grid"></div>
        <div class="ba-splash-core">
            <div class="ba-splash-mark"><span></span><i></i></div>
            <small>AYPI // ENCODING SYSTEM</small>
            <h1>QR GENERATOR</h1>
            <p>Preparazione ambiente di codifica</p>
            <div class="ba-splash-progress"><i></i></div>
        </div>
    </div>
    <div class="container">
        <header class="utility-header">
            <div>
                <span class="ba-only utility-kicker">UTILITY 02 // DATA ENCODING</span>
                <h2>Generatore QR/Barcode</h2>
                <p class="ba-only utility-subtitle">Trasforma testo e collegamenti in codici pronti per la produzione.
                </p>
            </div>
            <div class="ba-only utility-badge"><i></i> ENCODER ONLINE</div>
        </header>

        <div class="section qr-input-section">
            <label for="contentInput">Testo/URL da codificare</label>
            <textarea id="contentInput" rows="3" placeholder="Inserisci il contenuto..."></textarea>
        </div>

        <div class="section qr-type-section">
            <label for="typeSelect">Tipo di codice</label>
            <select id="typeSelect">
                <option value="qr">QR Code</option>
                <option value="barcode">Codice a barre (Code 128)</option>
            </select>
        </div>

        <div class="section options-row qr-options-section">
            <div>
                <label for="sizeInput">Dimensione (px)</label>
                <input type="number" id="sizeInput" value="256" min="100" max="1000">
            </div>
            <div>
                <label for="marginInput">Margine</label>
                <input type="number" id="marginInput" value="4" min="0" max="32">
            </div>
        </div>

        <div class="section qr-barcode-section" id="barcodeExtraOptions" style="display:none;">
            <label for="barcodeHeight">Altezza barcode (unità grafiche)</label>
            <input type="number" id="barcodeHeight" value="10" min="5" max="50">

            <label class="inline">
                <input type="checkbox" id="barcodeShowText" checked>
                Mostra il testo sotto al codice a barre
            </label>
        </div>

        <div class="section buttons qr-buttons-section">
            <button id="btnGenerate">Genera</button>
            <button id="btnSave" disabled>Salva come immagine...</button>
            <button id="btnClose">Chiudi</button>
        </div>

        <div class="section preview qr-preview-section">
            <div id="previewBox">
                <span class="ba-only preview-scanner"></span>
                <span class="ba-only preview-label">LIVE PREVIEW // 01</span>
                <span id="previewPlaceholder">Nessun codice generato.</span>
                <img id="previewImage" alt="Anteprima codice" style="display:none;">
            </div>
        </div>
    </div>

    <script src="../../scripts/utilities/qr-generator-scripts.js"></script>
</body>

</html>
